<svg xmlns="http://www.w3.org/2000/svg" viewBox="35 14 78 68" width="100%" height="100%">
  <style>
    /* Default light mode colors */
    .brand-primary {
      fill: #1B2C4F; /* Navy */
      transition: fill 0.3s ease;
    }
    .brand-accent-bg {
      fill: #6E97C0; /* Steel blue */
    }
    .brand-accent-border {
      stroke: #1B2C4F; /* Navy outline */
      stroke-width: 1.5;
      fill: none;
      transition: stroke 0.3s ease;
    }
    .phi-stroke {
      stroke: #F2F1EE; /* Canvas / Off-white */
      stroke-width: 2.5;
      stroke-linecap: round;
    }
    .phi-loop {
      stroke: #F2F1EE;
      stroke-width: 2;
      fill: none;
    }

    /* Dark mode colors */
    @media (prefers-color-scheme: dark) {
      .brand-primary {
        fill: #F2F1EE; /* Canvas / Off-white */
      }
      .brand-accent-border {
        stroke: #F2F1EE;
      }
    }
  </style>

  <!-- Letter P -->
  <path class="brand-primary" d="M38.8,78.5h27.8v-6.3h-8.8V49.1c7.3,0,13-1.6,17.2-4.8c4.2-3.2,6.3-8.2,6.3-15.1c0-6.6-2.1-11.4-6.4-14.4c-4.3-3-9.8-4.5-16.6-4.5H38.8v6.3h8.8v55.8h-8.8V78.5z M57.6,16.8c3.9,0,6.9,0.9,9,2.8c2.1,1.9,3.1,4.9,3.1,8.9c0,4.1-1,7-3.1,8.9c-2.1,1.9-5.1,2.8-9,2.8h-1v-23.4H57.6z"/>
  
  <!-- Letter N -->
  <path class="brand-primary" d="M87.3,78.5h23v-6.3h-6.7V23.1h6.7v-6.3h-21l-24.8,42.5V23.1h6.7v-6.3H58.4v6.3h6.7v55.8h-6.7v6.3h21.1L100,37.3v34.9h-6.7v6.3H87.3z"/>
  
  <!-- Accent Circle in the P's bowl (centered around cx=68, cy=32) -->
  <circle cx="68" cy="32" r="14" class="brand-accent-bg" />
  <circle cx="68" cy="32" r="14" class="brand-accent-border" />
  
  <!-- Phi Symbol (Φ) inside the circle -->
  <circle cx="68" cy="32" r="6" class="phi-loop" />
  <line x1="68" y1="21" x2="68" y2="43" class="phi-stroke" />
</svg>
